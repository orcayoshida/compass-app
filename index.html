<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URA-KAKU（裏確）| その会社、マジで自分に合ってる？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #1B2A4A;
      --navy-dark: #111B30;
      --navy-light: #243558;
      --gold: #C9A84C;
      --gold-light: #E2C97A;
      --gray: #4A5568;
      --gray-light: #718096;
      --offwhite: #F7F8FA;
      --white: #FFFFFF;
      --danger: #E05252;
      --success: #48BB78;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--navy-dark);
      color: var(--offwhite);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(27,42,74,0.8) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .screen {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease forwards;
    }
    .screen.active { display: flex; flex-direction: column; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== STEP 1: TOP ========== */
    #step1 {
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .top-container {
      width: 100%;
      max-width: 520px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-badge {
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.4);
      padding: 4px 16px;
      border-radius: 2px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .logo-title {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(48px, 12vw, 80px);
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.05em;
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .logo-title span {
      color: var(--gold);
    }

    .logo-ruby {
      display: block;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--gray-light);
      letter-spacing: 0.15em;
      margin-top: 8px;
    }

    .catch {
      margin-top: 20px;
      font-size: 13px;
      color: var(--gray-light);
      line-height: 1.8;
    }
    .catch strong {
      display: block;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      color: var(--offwhite);
      margin-bottom: 4px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 32px auto;
      opacity: 0.5;
    }

    .form-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"], select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 14px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.05);
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    select option {
      background: var(--navy-dark);
      color: var(--offwhite);
    }

    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
      font-size: 14px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--navy-dark);
      border: none;
      border-radius: 4px;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading-text {
      text-align: center;
      font-size: 13px;
      color: var(--gray-light);
      margin-top: 12px;
      min-height: 20px;
    }

    /* ========== STEP 2: QUIZ ========== */
    #step2 {
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .quiz-container {
      width: 100%;
      max-width: 560px;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .quiz-brand {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1em;
    }

    .quiz-step-info {
      font-size: 12px;
      color: var(--gray-light);
      letter-spacing: 0.1em;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      margin-bottom: 40px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 1px;
      transition: width 0.4s ease;
    }

    .question-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .question-text {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(16px, 4vw, 20px);
      line-height: 1.7;
      color: var(--white);
      margin-bottom: 32px;
      min-height: 80px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    .choice-btn {
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      color: var(--offwhite);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .choice-btn:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.06);
    }

    .choice-btn.selected {
      border-color: var(--gold);
      background: rgba(201,168,76,0.12);
      color: var(--white);
    }

    .choice-mark {
      width: 20px;
      height: 20px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .choice-btn.selected .choice-mark {
      background: var(--gold);
      border-color: var(--gold);
    }

    .quiz-nav {
      display: flex;
      gap: 12px;
    }

    .btn-nav {
      flex: 1;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      background: transparent;
      color: var(--offwhite);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-nav:hover { border-color: var(--gold); color: var(--gold); }

    .btn-nav-primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy-dark);
      font-weight: 700;
    }

    .btn-nav-primary:hover { background: var(--gold-light); color: var(--navy-dark); }
    .btn-nav-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--gold);
      margin-bottom: 28px;
    }

    /* ========== STEP 3: RESULTS ========== */
    #step3 {
      padding: 40px 20px 60px;
      align-items: center;
    }

    .results-container {
      width: 100%;
      max-width: 640px;
    }

    .results-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .results-brand {
      font-family: 'Noto Serif JP', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.15em;
      margin-bottom: 16px;
    }

    .results-title {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.4;
    }

    .company-target {
      display: inline-block;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 3px;
      padding: 2px 10px;
      font-size: 14px;
      color: var(--gold);
      margin-bottom: 12px;
    }

    /* Match score */
    .match-score-card {
      background: linear-gradient(135deg, rgba(27,42,74,0.8), rgba(17,27,48,0.9));
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .match-score-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .match-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .match-number {
      font-family: 'Noto Serif JP', serif;
      font-size: 72px;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }

    .match-number span {
      font-size: 32px;
      color: var(--gold);
    }

    .match-verdict {
      margin-top: 12px;
      font-size: 15px;
      color: var(--gray-light);
      line-height: 1.6;
    }

    /* Radar */
    .chart-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .chart-wrapper {
      position: relative;
      max-width: 320px;
      margin: 0 auto 24px;
    }

    /* Axis bars */
    .axis-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .axis-item {}

    .axis-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .axis-name {
      font-size: 12px;
      color: var(--offwhite);
    }

    .axis-val {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
    }

    .axis-bar-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    .axis-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 1s ease;
    }

    /* OB Comment */
    .ob-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 3px solid var(--gold);
      border-radius: 0 8px 8px 0;
      padding: 24px;
      margin-bottom: 24px;
      position: relative;
    }

    .ob-quote-mark {
      font-family: 'Noto Serif JP', serif;
      font-size: 48px;
      line-height: 1;
      color: rgba(201,168,76,0.2);
      position: absolute;
      top: 12px;
      left: 16px;
    }

    .ob-text {
      font-size: 14px;
      line-height: 1.9;
      color: var(--offwhite);
      padding-left: 8px;
    }

    .ob-attribution {
      margin-top: 12px;
      font-size: 11px;
      color: var(--gray-light);
      letter-spacing: 0.1em;
    }

    /* Axes cards */
    .axes-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .axis-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 18px 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .axis-icon {
      width: 32px;
      height: 32px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .axis-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .axis-card-desc {
      font-size: 12px;
      color: var(--gray-light);
      line-height: 1.7;
    }

    /* Retry button */
    .btn-retry {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: var(--gray-light);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-retry:hover { border-color: var(--gold); color: var(--gold); }

    /* Loading overlay */
    #loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(17,27,48,0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    #loading-overlay.active { display: flex; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msg {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      color: var(--offwhite);
      text-align: center;
      line-height: 1.8;
    }

    .loading-sub {
      font-size: 12px;
      color: var(--gray-light);
      text-align: center;
    }

    /* Error message */
    .error-msg {
      background: rgba(224,82,82,0.1);
      border: 1px solid rgba(224,82,82,0.3);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      color: #FC8181;
      margin-top: 12px;
      display: none;
    }

    @media (max-width: 480px) {
      .form-card { padding: 24px 20px; }
      .match-score-card { padding: 24px; }
    }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">OBのリアルな声をもとに<br>質問を生成しています...</div>
  <div class="loading-sub">少々お待ちください</div>
</div>

<!-- STEP 1: TOP -->
<div id="step1" class="screen active">
  <div class="top-container">
    <div class="logo-area">
      <div class="logo-badge">Career Diagnosis</div>
      <h1 class="logo-title">URA-<span>KAKU</span></h1>
      <span class="logo-ruby">裏　確</span>
      <div class="divider"></div>
      <div class="catch">
        <strong>その会社、マジで自分に合ってる？</strong>
        5年後の不安を、裏まで確認して自信に変える。
      </div>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label for="company-input">企業名</label>
        <input type="text" id="company-input" placeholder="例：トヨタ自動車、楽天グループ" />
      </div>
      <div class="form-group">
        <label for="industry-select">業界</label>
        <div class="select-wrapper">
          <select id="industry-select">
            <option value="">業界を選択してください</option>
            <option value="メーカー（自動車・機械・電機・食品・化学）">メーカー（自動車・機械・電機・食品・化学）</option>
            <option value="商社（総合商社・専門商社）">商社（総合商社・専門商社）</option>
            <option value="金融（銀行・証券・保険・ファンド）">金融（銀行・証券・保険・ファンド）</option>
            <option value="コンサルティング（戦略・IT・総合）">コンサルティング（戦略・IT・総合）</option>
            <option value="IT・テック（ソフトウェア・SaaS・AI）">IT・テック（ソフトウェア・SaaS・AI）</option>
            <option value="広告・メディア（広告代理店・出版・放送）">広告・メディア（広告代理店・出版・放送）</option>
            <option value="不動産・建設">不動産・建設</option>
            <option value="医療・製薬・ヘルスケア">医療・製薬・ヘルスケア</option>
            <option value="物流・インフラ・エネルギー">物流・インフラ・エネルギー</option>
            <option value="官公庁・公務員・非営利">官公庁・公務員・非営利</option>
            <option value="スタートアップ・ベンチャー">スタートアップ・ベンチャー</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" id="start-btn" onclick="startDiagnosis()">裏まで確認する →</button>
      <div class="error-msg" id="error-top"></div>
    </div>
  </div>
</div>

<!-- STEP 2: QUIZ -->
<div id="step2" class="screen">
  <div class="quiz-container">
    <div class="quiz-header">
      <div class="quiz-brand">URA-KAKU</div>
      <div class="quiz-step-info" id="step-info">Q1 / 5</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:20%"></div>
    </div>
    <div class="context-chip" id="context-chip">
      <span>📍</span><span id="context-text">企業名 × 業界</span>
    </div>
    <div class="question-number" id="q-number">QUESTION 01</div>
    <div class="question-text" id="q-text">質問を読み込んでいます...</div>
    <div class="choices" id="choices-container"></div>
    <div class="quiz-nav">
      <button class="btn-nav" id="prev-btn" onclick="prevQuestion()" style="display:none">← 前へ</button>
      <button class="btn-nav btn-nav-primary" id="next-btn" onclick="nextQuestion()" disabled>次へ →</button>
    </div>
  </div>
</div>

<!-- STEP 3: RESULTS -->
<div id="step3" class="screen">
  <div class="results-container">
    <div class="results-header">
      <div class="results-brand">URA-KAKU 診断結果</div>
      <div class="company-target" id="result-company-badge"></div>
      <h2 class="results-title" id="result-title">マッチ度診断</h2>
    </div>

    <!-- Match Score -->
    <div class="match-score-card">
      <div class="match-label">総合マッチ度</div>
      <div class="match-number" id="match-number">—<span>%</span></div>
      <div class="match-verdict" id="match-verdict">結果を計算中...</div>
    </div>

    <!-- Radar Chart -->
    <div class="chart-card">
      <div class="section-title">5軸マッチ度レーダー</div>
      <div class="chart-wrapper">
        <canvas id="radarChart"></canvas>
      </div>
      <div class="axis-list" id="axis-list"></div>
    </div>

    <!-- OB Comment -->
    <div class="ob-card" id="ob-card">
      <div class="ob-quote-mark">"</div>
      <div class="section-title" style="margin-bottom:12px">OBからの本音</div>
      <div class="ob-text" id="ob-text">読み込み中...</div>
      <div class="ob-attribution">— 現役OB・OG（匿名）</div>
    </div>

    <!-- Axes -->
    <div class="chart-card" style="margin-bottom:24px">
      <div class="section-title">あなたの軸 3選</div>
      <div class="axes-grid" id="axes-grid"></div>
    </div>

    <button class="btn-retry" onclick="restart()">もう一度診断する</button>
  </div>
</div>

<script>
  const AXIS_NAMES = ['価値観一致度', '成長環境適合度', '働き方適合度', '動機の純度', 'ストレス耐性'];
  const AXIS_ICONS = ['🎯', '🌱', '⏰', '💡', '🛡️'];
  const CHOICES = ['とても当てはまる', '少し当てはまる', 'あまり当てはまらない', '全く当てはまらない'];

  let currentQ = 0;
  let questions = [];
  let answers = [];
  let companyName = '';
  let industry = '';
  let radarChart = null;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    const el = document.getElementById(id);
    el.style.display = 'flex';
    requestAnimationFrame(() => el.classList.add('active'));
  }

  function setLoading(active, msg = '') {
    const ov = document.getElementById('loading-overlay');
    if (active) {
      ov.classList.add('active');
      if (msg) document.getElementById('loading-msg').innerHTML = msg;
    } else {
      ov.classList.remove('active');
    }
  }

  async function callAPI(body) {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `APIエラー (${res.status})`);
    }
    return res.json();
  }

  async function startDiagnosis() {
    companyName = document.getElementById('company-input').value.trim();
    industry = document.getElementById('industry-select').value;
    const errEl = document.getElementById('error-top');
    errEl.style.display = 'none';

    if (!companyName) { errEl.textContent = '企業名を入力してください。'; errEl.style.display = 'block'; return; }
    if (!industry) { errEl.textContent = '業界を選択してください。'; errEl.style.display = 'block'; return; }

    setLoading(true, 'OBのリアルな声をもとに<br>質問を生成しています...');

    try {
      const data = await callAPI({ type: 'generate_questions', company: companyName, industry });
      questions = data.questions;
      answers = new Array(5).fill(null);

      document.getElementById('context-text').textContent = `${companyName} × ${industry}`;
      currentQ = 0;
      renderQuestion();
      showScreen('step2');
    } catch (e) {
      errEl.textContent = e.message || '通信エラーが発生しました。しばらくしてからお試しください。';
      errEl.style.display = 'block';
    } finally {
      setLoading(false);
    }
  }

  function renderQuestion() {
    const q = questions[currentQ];
    document.getElementById('q-number').textContent = `QUESTION ${String(currentQ + 1).padStart(2, '0')}`;
    document.getElementById('q-text').textContent = q;
    document.getElementById('step-info').textContent = `Q${currentQ + 1} / 5`;
    document.getElementById('progress-fill').style.width = `${(currentQ + 1) / 5 * 100}%`;

    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    CHOICES.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (answers[currentQ] === i ? ' selected' : '');
      btn.innerHTML = `<div class="choice-mark"></div><span>${c}</span>`;
      btn.onclick = () => selectChoice(i);
      container.appendChild(btn);
    });

    document.getElementById('prev-btn').style.display = currentQ > 0 ? 'block' : 'none';
    const nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = answers[currentQ] === null;
    nextBtn.textContent = currentQ === 4 ? '結果を見る →' : '次へ →';
  }

  function selectChoice(i) {
    answers[currentQ] = i;
    document.querySelectorAll('.choice-btn').forEach((btn, idx) => {
      btn.classList.toggle('selected', idx === i);
    });
    document.getElementById('next-btn').disabled = false;
  }

  function prevQuestion() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
  }

  async function nextQuestion() {
    if (answers[currentQ] === null) return;
    if (currentQ < 4) {
      currentQ++;
      renderQuestion();
    } else {
      await computeResults();
    }
  }

  async function computeResults() {
    setLoading(true, '回答を分析しています...<br>OBの本音コメントを準備中です。');

    const qaList = questions.map((q, i) => ({
      question: q,
      answer: CHOICES[answers[i]],
      score: [4, 3, 2, 1][answers[i]]
    }));

    try {
      const data = await callAPI({ type: 'generate_results', company: companyName, industry, qa: qaList });
      renderResults(data);
      showScreen('step3');
    } catch (e) {
      alert('結果の生成中にエラーが発生しました: ' + e.message);
    } finally {
      setLoading(false);
    }
  }

  function renderResults(data) {
    // Match score
    document.getElementById('result-company-badge').textContent = `${companyName} × ${industry}`;
    document.getElementById('match-number').innerHTML = `${data.totalScore}<span>%</span>`;
    document.getElementById('match-verdict').textContent = data.verdict;

    // Axis bars
    const axisListEl = document.getElementById('axis-list');
    axisListEl.innerHTML = '';
    AXIS_NAMES.forEach((name, i) => {
      const val = data.scores[i];
      axisListEl.innerHTML += `
        <div class="axis-item">
          <div class="axis-row">
            <span class="axis-name">${name}</span>
            <span class="axis-val">${val}%</span>
          </div>
          <div class="axis-bar-track">
            <div class="axis-bar-fill" style="width:${val}%"></div>
          </div>
        </div>`;
    });

    // Radar
    if (radarChart) radarChart.destroy();
    const ctx = document.getElementById('radarChart').getContext('2d');
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: AXIS_NAMES,
        datasets: [{
          data: data.scores,
          backgroundColor: 'rgba(201,168,76,0.15)',
          borderColor: '#C9A84C',
          borderWidth: 2,
          pointBackgroundColor: '#C9A84C',
          pointRadius: 4,
        }]
      },
      options: {
        responsive: true,
        scales: {
          r: {
            min: 0, max: 100,
            ticks: { display: false },
            grid: { color: 'rgba(255,255,255,0.08)' },
            angleLines: { color: 'rgba(255,255,255,0.08)' },
            pointLabels: {
              color: '#A0AEC0',
              font: { family: "'Noto Sans JP'", size: 10 }
            }
          }
        },
        plugins: { legend: { display: false } }
      }
    });

    // OB comment
    document.getElementById('ob-text').textContent = data.obComment;

    // Axes
    const axesGrid = document.getElementById('axes-grid');
    axesGrid.innerHTML = '';
    data.userAxes.forEach((ax, i) => {
      axesGrid.innerHTML += `
        <div class="axis-card">
          <div class="axis-icon">${['①','②','③'][i]}</div>
          <div>
            <div class="axis-card-title">${ax.label}</div>
            <div class="axis-card-desc">${ax.description}</div>
          </div>
        </div>`;
    });
  }

  function restart() {
    document.getElementById('company-input').value = '';
    document.getElementById('industry-select').value = '';
    document.getElementById('error-top').style.display = 'none';
    showScreen('step1');
  }
</script>
</body>
</html>
