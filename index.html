<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass — 企業を選ぶ前に、自分を知る</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A4A;
    --navy-light: #243660;
    --navy-dark: #111d33;
    --gray: #4A5568;
    --gray-light: #718096;
    --offwhite: #F7F8FA;
    --accent: #C9A96E;
    --accent-light: #E8D5B0;
    --white: #ffffff;
    --border: rgba(255,255,255,0.12);
    --border-dark: rgba(27,42,74,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy-dark);
    color: var(--offwhite);
    min-height: 100vh;
    line-height: 1.8;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(201,169,110,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(27,42,74,0.8) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 48px 0 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    opacity: 0.85;
  }

  .tagline {
    margin-top: 12px;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--accent-light);
    text-transform: uppercase;
  }

  /* API Key Section */
  .api-section {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 40px;
  }

  .api-section label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--gray-light);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .api-section input {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--offwhite);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    transition: border-color 0.2s;
    outline: none;
  }

  .api-section input:focus {
    border-color: var(--accent);
  }

  /* Input Card */
  .input-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    margin-bottom: 40px;
  }

  .input-card h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 8px;
  }

  .input-card .subtitle {
    font-size: 0.82rem;
    color: var(--gray-light);
    font-weight: 300;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .form-group {
    margin-bottom: 24px;
  }

  .form-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--accent-light);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .form-group input {
    width: 100%;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }

  .form-group input::placeholder {
    color: rgba(255,255,255,0.25);
    font-weight: 300;
  }

  .form-group input:focus {
    border-color: var(--accent);
    background: rgba(0,0,0,0.35);
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #a8844f 100%);
    border: none;
    border-radius: 10px;
    color: var(--navy-dark);
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 8px;
  }

  .btn-primary:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 48px 0;
  }

  .loading.active { display: block; }

  .loading-compass {
    width: 48px;
    height: 48px;
    margin: 0 auto 20px;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading p {
    font-size: 0.85rem;
    color: var(--gray-light);
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  /* Questions Section */
  .questions-section {
    display: none;
  }

  .questions-section.active { display: block; }

  .section-header {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-header .context {
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .section-header h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--white);
  }

  /* Question Card */
  .question-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .question-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .question-number {
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .question-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--white);
    line-height: 1.9;
    margin-bottom: 20px;
  }

  .answer-textarea {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--offwhite);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    line-height: 1.8;
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.2s;
    outline: none;
  }

  .answer-textarea::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .answer-textarea:focus {
    border-color: rgba(201,169,110,0.5);
  }

  /* Progress */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    height: 3px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #e8c87a);
    border-radius: 99px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .btn-submit-all {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    margin-top: 16px;
    margin-bottom: 48px;
    display: none;
  }

  .btn-submit-all:hover {
    background: var(--accent);
    color: var(--navy-dark);
  }

  .btn-submit-all.visible { display: block; }

  /* Summary */
  .summary-section {
    display: none;
    padding-bottom: 80px;
  }

  .summary-section.active { display: block; }

  .summary-card {
    background: linear-gradient(135deg, rgba(201,169,110,0.1) 0%, rgba(27,42,74,0.6) 100%);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 16px;
    padding: 40px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .summary-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .summary-card .label {
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .summary-card h3 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    font-weight: 300;
    color: var(--white);
    margin-bottom: 24px;
  }

  .summary-content {
    font-size: 0.92rem;
    color: var(--offwhite);
    font-weight: 300;
    line-height: 2;
    white-space: pre-wrap;
  }

  .btn-restart {
    display: block;
    width: 100%;
    padding: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--gray-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    margin-top: 24px;
    text-align: center;
  }

  .btn-restart:hover {
    background: rgba(255,255,255,0.1);
    color: var(--offwhite);
  }

  /* Error */
  .error-msg {
    background: rgba(220,50,50,0.1);
    border: 1px solid rgba(220,50,50,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 0.85rem;
    color: #ff8080;
    margin-top: 16px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* Responsive */
  @media (max-width: 600px) {
    .input-card { padding: 28px 24px; }
    .question-card { padding: 24px 20px; }
    .summary-card { padding: 28px 24px; }
    header { padding: 36px 0 32px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="16" stroke="#C9A96E" stroke-width="1.5" fill="none"/>
        <circle cx="18" cy="18" r="2" fill="#C9A96E"/>
        <line x1="18" y1="4" x2="18" y2="11" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="18" y1="25" x2="18" y2="32" stroke="rgba(201,169,110,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4" y1="18" x2="11" y2="18" stroke="rgba(201,169,110,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="25" y1="18" x2="32" y2="18" stroke="rgba(201,169,110,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <polygon points="18,6 20,17 18,16 16,17" fill="#C9A96E" opacity="0.9"/>
      </svg>
      Compass
    </div>
    <p class="tagline">企業を選ぶ前に、自分を知る</p>
  </header>

  <!-- API Key -->
  <div class="api-section">
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>

  <!-- Input Form -->
  <div class="input-card" id="inputSection">
    <h2>あなたが気になっている企業は？</h2>
    <p class="subtitle">企業名と業界を入力してください。AIがあなた自身に問うべき10の質問を生成します。</p>
    <div class="form-group">
      <label>企業名</label>
      <input type="text" id="companyName" placeholder="例：トヨタ自動車、Google Japan、三菱商事…">
    </div>
    <div class="form-group">
      <label>業界</label>
      <input type="text" id="industry" placeholder="例：自動車、IT・テック、総合商社、金融…">
    </div>
    <button class="btn-primary" id="generateBtn" onclick="generateQuestions()">自分に問う</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingSection">
    <svg class="loading-compass" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#C9A96E" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
      <circle cx="24" cy="24" r="3" fill="#C9A96E"/>
      <polygon points="24,6 26.5,22 24,21 21.5,22" fill="#C9A96E"/>
    </svg>
    <p>あなたへの問いを生成しています…</p>
  </div>

  <!-- Questions -->
  <div class="questions-section" id="questionsSection">
    <div class="section-header">
      <p class="context" id="contextLabel"></p>
      <h2>あなた自身に問うべき10の質問</h2>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="questionsList"></div>
    <button class="btn-submit-all" id="submitAllBtn" onclick="generateSummary()">回答をもとに「自分の軸」を見つける</button>
  </div>

  <!-- Summary -->
  <div class="summary-section" id="summarySection">
    <div class="loading" id="summaryLoading" style="display:none">
      <svg class="loading-compass" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="#C9A96E" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
        <circle cx="24" cy="24" r="3" fill="#C9A96E"/>
        <polygon points="24,6 26.5,22 24,21 21.5,22" fill="#C9A96E"/>
      </svg>
      <p>あなたの軸を分析しています…</p>
    </div>
    <div class="summary-card" id="summaryCard">
      <p class="label">Your Compass</p>
      <h3>あなたが企業選びで本当に大切にしていること</h3>
      <div class="summary-content" id="summaryContent"></div>
    </div>
    <button class="btn-restart" onclick="restart()">最初からやり直す</button>
  </div>
</div>

<script>
let questions = [];
let answers = {};

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

async function callClaude(apiKey, systemPrompt, userMessage) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `APIエラー (${res.status})`);
  }

  const data = await res.json();
  return data.content[0].text;
}

async function generateQuestions() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const company = document.getElementById('companyName').value.trim();
  const industry = document.getElementById('industry').value.trim();

  hideError();

  if (!apiKey) { showError('APIキーを入力してください。'); return; }
  if (!company) { showError('企業名を入力してください。'); return; }
  if (!industry) { showError('業界を入力してください。'); return; }

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('inputSection').style.opacity = '0.5';
  document.getElementById('loadingSection').classList.add('active');

  const systemPrompt = 'あなたは就活生のキャリアコーチです。就活生が企業を選ぶ前に、表面的な条件（給与・知名度・安定性）ではなく、自分の価値観・強み・人生観と企業が本当に合っているかを深く内省できるよう、鋭い質問を生成してください。質問は答えるのが少し怖くなるくらい本質的なものにしてください。';

  const userMessage = `企業名：${company}
業界：${industry}

この企業・業界を選ぶ前に、就活生が自分自身に問うべき10の質問を生成してください。
以下の形式で出力してください（番号と質問文のみ。説明や補足は不要）：

1. （質問文）
2. （質問文）
...
10. （質問文）`;

  try {
    const text = await callClaude(apiKey, systemPrompt, userMessage);
    const lines = text.split('\n').filter(l => /^\d+\./.test(l.trim()));
    questions = lines.map(l => l.replace(/^\d+\.\s*/, '').trim()).filter(q => q.length > 0).slice(0, 10);

    if (questions.length < 5) throw new Error('質問の生成に失敗しました。再度お試しください。');

    document.getElementById('loadingSection').classList.remove('active');
    document.getElementById('inputSection').style.display = 'none';
    document.getElementById('contextLabel').textContent = `${company} × ${industry}`;
    renderQuestions();
  } catch (e) {
    document.getElementById('loadingSection').classList.remove('active');
    document.getElementById('inputSection').style.opacity = '1';
    document.getElementById('generateBtn').disabled = false;
    showError(e.message);
  }
}

function renderQuestions() {
  const list = document.getElementById('questionsList');
  list.innerHTML = '';
  answers = {};

  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `qcard-${i}`;
    card.innerHTML = `
      <div class="question-number">Question ${String(i+1).padStart(2,'0')}</div>
      <p class="question-text">${q}</p>
      <textarea class="answer-textarea" id="answer-${i}" placeholder="ここに自由に書いてみてください…" oninput="updateProgress()"></textarea>
    `;
    list.appendChild(card);

    setTimeout(() => {
      card.classList.add('visible');
    }, 80 * i);
  });

  document.getElementById('questionsSection').classList.add('active');
  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  let filled = 0;
  questions.forEach((_, i) => {
    const ta = document.getElementById(`answer-${i}`);
    if (ta && ta.value.trim().length > 0) filled++;
  });

  const pct = total > 0 ? (filled / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';

  const btn = document.getElementById('submitAllBtn');
  if (filled === total) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

async function generateSummary() {
  const apiKey = document.getElementById('apiKey').value.trim();

  const qa = questions.map((q, i) => {
    const ans = document.getElementById(`answer-${i}`)?.value.trim() || '（未回答）';
    return `Q${i+1}: ${q}\nA: ${ans}`;
  }).join('\n\n');

  document.getElementById('submitAllBtn').style.display = 'none';
  document.getElementById('summarySection').classList.add('active');
  document.getElementById('summaryLoading').style.display = 'block';
  document.getElementById('summaryCard').style.display = 'none';

  window.scrollTo({ top: document.getElementById('summarySection').offsetTop - 40, behavior: 'smooth' });

  const systemPrompt = 'あなたは就活生のキャリアコーチです。就活生の内省の回答をもとに、その人が企業選びで本当に大切にしていることを鋭く要約してください。表面的な言葉ではなく、回答の背後にある価値観・欲求・恐れを読み取って言語化してください。';

  const userMessage = `以下は就活生が企業を選ぶ前に自分自身に問い、答えた内容です。

${qa}

この回答内容をもとに「あなたが企業選びで本当に大切にしていること」を3点で要約してください。
各ポイントは2〜4文で深く掘り下げ、就活生が「そうか、自分はこういう人間なんだ」と気づけるような言語化をしてください。

形式：
▍軸1：（タイトル）
（説明）

▍軸2：（タイトル）
（説明）

▍軸3：（タイトル）
（説明）`;

  try {
    const text = await callClaude(apiKey, systemPrompt, userMessage);
    document.getElementById('summaryLoading').style.display = 'none';
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('summaryContent').textContent = text;
    setTimeout(() => {
      document.getElementById('summaryCard').classList.add('visible');
    }, 50);
  } catch (e) {
    document.getElementById('summaryLoading').style.display = 'none';
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('summaryContent').textContent = 'サマリーの生成に失敗しました：' + e.message;
    document.getElementById('summaryCard').classList.add('visible');
  }
}

function restart() {
  questions = [];
  answers = {};
  document.getElementById('companyName').value = '';
  document.getElementById('industry').value = '';
  document.getElementById('inputSection').style.opacity = '1';
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('questionsSection').classList.remove('active');
  document.getElementById('summarySection').classList.remove('active');
  document.getElementById('summaryCard').classList.remove('visible');
  document.getElementById('summaryCard').style.display = 'none';
  document.getElementById('questionsList').innerHTML = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('submitAllBtn').classList.remove('visible');
  hideError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
